name: pet_finder
description: "PetFinder - Community board for lost and found pets"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management & DI
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  get_it: ^9.2.1
  dartz: ^0.10.1

  # Navigation
  go_router: ^17.1.0

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3

  # Local storage (offline-first)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2

  # Map — OpenStreetMap (free)
  flutter_map: ^8.2.2
  latlong2: ^0.9.1

  # Location
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # Network & HTTP (for Cloudinary)
  connectivity_plus: ^7.0.0
  http: ^1.2.2

  # Utils
  url_launcher: ^6.3.0
  share_plus: ^12.0.1
  permission_handler: ^12.0.1
  uuid: ^4.4.2
  intl: ^0.20.0
  flutter_dotenv: ^5.2.1

  # UI enhancements
  shimmer: ^3.0.0
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/lottie/
